version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: electricity_theft_db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-electricity_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-electricity_password}
      POSTGRES_DB: ${DATABASE_NAME:-electricity_theft_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - electricity_network
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: electricity_theft_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - electricity_network
    restart: unless-stopped

  # Main Application
  app:
    build: .
    container_name: electricity_theft_app
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-electricity_user}:${DATABASE_PASSWORD:-electricity_password}@db:5432/${DATABASE_NAME:-electricity_theft_db}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-electricity_theft_db}
      DATABASE_USER: ${DATABASE_USER:-electricity_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-electricity_password}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      SECRET_KEY: ${SECRET_KEY:-electricity-theft-detection-secret-key}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - electricity_network
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electricity_theft_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - app
    networks:
      - electricity_network
    restart: unless-stopped

  # Nginx reverse proxy (production)
  nginx:
    image: nginx:alpine
    container_name: electricity_theft_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
      - frontend
    networks:
      - electricity_network
    restart: unless-stopped
    profiles:
      - production

  # Prometheus for monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: electricity_theft_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - electricity_network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  electricity_network:
    driver: bridge